<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 292" width="720" height="292">

  <!-- Background -->
  <rect width="720" height="292" fill="#1e1e2e" rx="12"/>

  <!-- Panel divider -->
  <line x1="360" y1="12" x2="360" y2="272" stroke="#2a2a44" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- LEFT PANEL: NN (Exact) — center at (180, 155)               -->
  <!-- ============================================================ -->

  <!-- Panel label -->
  <text x="180" y="28" fill="#aaaacc" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle">NN — Exact</text>
  <text x="180" y="44" fill="#555577" font-size="10" font-family="sans-serif" text-anchor="middle">compare query against ALL documents</text>

  <!-- Lines to far points -->
  <g stroke="#252538" stroke-width="0.9">
    <line x1="180" y1="155" x2="80"  y2="75"/>
    <line x1="180" y1="155" x2="270" y2="85"/>
    <line x1="180" y1="155" x2="100" y2="215"/>
    <line x1="180" y1="155" x2="280" y2="235"/>
    <line x1="180" y1="155" x2="70"  y2="175"/>
    <line x1="180" y1="155" x2="290" y2="125"/>
    <line x1="180" y1="155" x2="120" y2="65"/>
    <line x1="180" y1="155" x2="260" y2="215"/>
    <line x1="180" y1="155" x2="90"  y2="115"/>
    <line x1="180" y1="155" x2="250" y2="65"/>
  </g>

  <!-- Lines to cluster points -->
  <g stroke="#2a3a2e" stroke-width="1">
    <line x1="180" y1="155" x2="150" y2="130"/>
    <line x1="180" y1="155" x2="170" y2="120"/>
    <line x1="180" y1="155" x2="200" y2="135"/>
    <line x1="180" y1="155" x2="215" y2="145"/>
    <line x1="180" y1="155" x2="135" y2="165"/>
    <line x1="180" y1="155" x2="195" y2="185"/>
    <line x1="180" y1="155" x2="160" y2="195"/>
    <line x1="180" y1="155" x2="220" y2="180"/>
  </g>

  <!-- Far points -->
  <g fill="#252538" stroke="#3a3a56" stroke-width="1.2">
    <circle cx="80"  cy="75"  r="5"/>
    <circle cx="270" cy="85"  r="5"/>
    <circle cx="100" cy="215" r="5"/>
    <circle cx="280" cy="235" r="5"/>
    <circle cx="70"  cy="175" r="5"/>
    <circle cx="290" cy="125" r="5"/>
    <circle cx="120" cy="65"  r="5"/>
    <circle cx="260" cy="215" r="5"/>
    <circle cx="90"  cy="115" r="5"/>
    <circle cx="250" cy="65"  r="5"/>
  </g>

  <!-- Cluster non-top-5 -->
  <g fill="#2a2a46" stroke="#44446a" stroke-width="1.2">
    <circle cx="135" cy="165" r="5"/>
    <circle cx="160" cy="195" r="5"/>
    <circle cx="220" cy="180" r="5"/>
  </g>

  <!-- Top-5 (green) -->
  <g fill="#1a3d28" stroke="#52b788" stroke-width="1.5">
    <circle cx="200" cy="135" r="6"/>
    <circle cx="195" cy="185" r="6"/>
    <circle cx="170" cy="120" r="6"/>
    <circle cx="215" cy="145" r="6"/>
    <circle cx="150" cy="130" r="6"/>
  </g>

  <!-- Query point -->
  <circle cx="180" cy="155" r="7" fill="#993300" stroke="#ff8833" stroke-width="2"/>
  <text x="190" y="173" fill="#ffaa66" font-size="9" font-family="sans-serif">query</text>

  <!-- ============================================================ -->
  <!-- RIGHT PANEL: ANN (Approx) — center at (540, 155)            -->
  <!-- ============================================================ -->

  <!-- Panel label -->
  <text x="540" y="28" fill="#aaaacc" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle">ANN — Approximate</text>
  <text x="540" y="44" fill="#555577" font-size="10" font-family="sans-serif" text-anchor="middle">narrow to region, then compare within</text>

  <!-- ANN candidate region -->
  <ellipse cx="545" cy="155" rx="90" ry="72"
           fill="rgba(42,80,120,0.14)" stroke="#3a7aaa" stroke-width="1.5" stroke-dasharray="7,4"/>

  <!-- Lines to cluster points only -->
  <g stroke="#2a4a60" stroke-width="1.1">
    <line x1="540" y1="155" x2="510" y2="130"/>
    <line x1="540" y1="155" x2="530" y2="120"/>
    <line x1="540" y1="155" x2="560" y2="135"/>
    <line x1="540" y1="155" x2="575" y2="145"/>
    <line x1="540" y1="155" x2="495" y2="165"/>
    <line x1="540" y1="155" x2="555" y2="185"/>
    <line x1="540" y1="155" x2="520" y2="195"/>
    <line x1="540" y1="155" x2="580" y2="180"/>
  </g>

  <!-- Far points (no lines) -->
  <g fill="#252538" stroke="#3a3a56" stroke-width="1.2">
    <circle cx="440" cy="75"  r="5"/>
    <circle cx="630" cy="85"  r="5"/>
    <circle cx="460" cy="215" r="5"/>
    <circle cx="640" cy="235" r="5"/>
    <circle cx="430" cy="175" r="5"/>
    <circle cx="650" cy="125" r="5"/>
    <circle cx="480" cy="65"  r="5"/>
    <circle cx="620" cy="215" r="5"/>
    <circle cx="450" cy="115" r="5"/>
    <circle cx="610" cy="65"  r="5"/>
  </g>

  <!-- Cluster non-top-5 -->
  <g fill="#2a2a46" stroke="#44446a" stroke-width="1.2">
    <circle cx="495" cy="165" r="5"/>
    <circle cx="520" cy="195" r="5"/>
    <circle cx="580" cy="180" r="5"/>
  </g>

  <!-- Top-5 (green) -->
  <g fill="#1a3d28" stroke="#52b788" stroke-width="1.5">
    <circle cx="560" cy="135" r="6"/>
    <circle cx="555" cy="185" r="6"/>
    <circle cx="530" cy="120" r="6"/>
    <circle cx="575" cy="145" r="6"/>
    <circle cx="510" cy="130" r="6"/>
  </g>

  <!-- Query point -->
  <circle cx="540" cy="155" r="7" fill="#993300" stroke="#ff8833" stroke-width="2"/>
  <text x="550" y="173" fill="#ffaa66" font-size="9" font-family="sans-serif">query</text>

  <!-- ANN region label -->
  <text x="545" y="86" fill="#4a8aaa" font-size="9" font-family="sans-serif" text-anchor="middle">candidate region</text>

  <!-- ============================================================ -->
  <!-- LEGEND                                                        -->
  <!-- ============================================================ -->
  <g transform="translate(0,276)">
    <circle cx="148" cy="0" r="5" fill="#993300" stroke="#ff8833" stroke-width="1.5"/>
    <text x="158" y="4" fill="#8888aa" font-size="10" font-family="sans-serif">query</text>

    <circle cx="210" cy="0" r="5" fill="#1a3d28" stroke="#52b788" stroke-width="1.5"/>
    <text x="220" y="4" fill="#8888aa" font-size="10" font-family="sans-serif">top-5 result</text>

    <circle cx="296" cy="0" r="5" fill="#252538" stroke="#3a3a56" stroke-width="1.2"/>
    <text x="306" y="4" fill="#8888aa" font-size="10" font-family="sans-serif">other document</text>

    <ellipse cx="403" cy="0" rx="14" ry="7" fill="rgba(42,80,120,0.2)" stroke="#3a7aaa" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="422" y="4" fill="#8888aa" font-size="10" font-family="sans-serif">ANN candidate region</text>
  </g>

</svg>
